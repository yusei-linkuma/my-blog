<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linterds OS - Central Blog</title>
    <link rel="stylesheet" href="abc.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // YuseiさんのConfigをここに貼ってください
        const firebaseConfig = {
            apiKey: "AIzaSyDTo9QSKDWg_CJ0Cp-TPeLSSdUw8QsilXE", //
            authDomain: "linterds-blog.firebaseapp.com", //
            projectId: "linterds-blog", //
            storageBucket: "linterds-blog.firebasestorage.app", //
            messagingSenderId: "426467117578", //
            appId: "1:426467117578:web:da5f95f4617b82b8662df3", //
            measurementId: "G-4NWPV8E3XR" //
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.query = query;
        window.orderBy = orderBy;
        window.onSnapshot = onSnapshot;
        window.serverTimestamp = serverTimestamp;
    </script>
    <script src="abc.js" defer></script>
</head>
<body>

    <header class="os-header">
        <div class="logo-container">
            <img src="Linterds OS LOGO.png" alt="Linterds OS Logo" class="os-logo">
            <h1 class="os-title">Linterds OS <span class="version">v2.0.0</span></h1>
        </div>
        <div class="status-bar">Connecting to Nexus Grid...</div>
    </header>

    <main class="os-main-container">
        <section class="publish-panel">
            <h2>> Terminal_Input: New_Log</h2>
            <input type="text" id="postTitle" placeholder="ログタイトルを入力...">
            <textarea id="postContent" placeholder="システムログの内容を記述..." rows="4"></textarea>
            <button onclick="addPost()">Execute::Publish</button>
        </section>

        <section class="log-viewer">
            <h2>> System_Archive: Public_Logs</h2>
            <div id="post-list">
                </div>
        </section>
    </main>

</body>
</html>
