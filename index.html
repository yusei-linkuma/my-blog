<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linterds OS - Central Blog</title>
    <link rel="stylesheet" href="abc.css">
</head>
<body>
    <header class="os-header">
        <div class="os-logo-section">
            <h1 class="os-title">Linterds OS <span class="version">v2.0</span></h1>
        </div>
        <div id="user-info" class="status-bar">
            <button id="login-btn">Google でログイン</button>
        </div>
    </header>

    <main class="os-main-container">
        <section class="publish-panel">
            <h2 id="welcome-msg">システムにログインしてください</h2>
            <p>ログインすると、記事の投稿や管理ができるようになります。</p>
        </section>

        <div id="post-list">
            <div class="featured-post">
                <div class="post-meta">SYSTEM MESSAGE</div>
                <h3>Linterds OS へようこそ</h3>
                <p>これはあなただけの次世代型ブログOSです。</p>
            </div>
        </div>
    </main>

    <script type="module" src="abc.js"></script>
</body>
</html>
